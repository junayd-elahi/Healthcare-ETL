version: 2

models:
  - name: stg_synthea__patients
    description: "One row per patient. Grain: patient_id."
    columns:
      - name: patient_id
        description: Primary key.
        tests:
          - unique
          - not_null
      - name: birth_date
        tests:
          - not_null
      - name: gender
        tests:
          - accepted_values:
              arguments:
                values: ['M', 'F']

  - name: stg_synthea__encounters
    description: "One row per clinical encounter. Grain: encounter_id."
    columns:
      - name: encounter_id
        description: Primary key.
        tests:
          - unique
          - not_null
      - name: patient_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_synthea__patients')
                field: patient_id
      - name: encounter_class
        tests:
          - accepted_values:
              values: ['ambulatory', 'emergency', 'hospice', 'home', 'inpatient', 'outpatient', 'snf', 'urgentcare', 'virtual', 'wellness']